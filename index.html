<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laberinto Inclusivo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Región en vivo para lectores de pantalla -->
  <div id="aria-live" aria-live="polite" class="sr-only"></div>

  <header>
    <h1>Laberinto Inclusivo</h1>
  </header>

  <main>
    <section class="game-info">
      <div class="coins-panel">
        <span>Monedas: <span id="coins-count">0</span> / <span id="coins-total">2</span></span>
      </div>
      <div class="inventory-panel">
        <span>Inventario: <span id="inventory-list">Vacío</span></span>
      </div>
    </section>

    <!-- Contenedor del Laberinto -->
    <section id="game-board" class="game-board" aria-label="Tablero del laberinto">
      <!-- Generado dinámicamente -->
    </section>

    <!-- Controles en pantalla -->
    <section class="controls-panel" aria-label="Controles de movimiento">
      <div class="d-pad">
        <button id="btn-up" class="control-btn" aria-label="Mover Arriba">↑</button>
        <div class="d-pad-middle">
          <button id="btn-left" class="control-btn" aria-label="Mover Izquierda">←</button>
          <div class="d-pad-center"></div>
          <button id="btn-right" class="control-btn" aria-label="Mover Derecha">→</button>
        </div>
        <button id="btn-down" class="control-btn" aria-label="Mover Abajo">↓</button>
      </div>
    </section>

    <!-- Mensaje de Victoria -->
    <div id="victory-message" class="hidden">
      <h2>¡Encuentra la salida!</h2>
      <p>Has completado el Nivel 1.</p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
